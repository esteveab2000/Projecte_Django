name: Genera documentació Pydoc

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Clona el repositori
        uses: actions/checkout@v4

      - name: Instal·la Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instal·la les dependències
        run: pip install -r requirements.txt

      - name: Genera els HTML amb Pydoc
        env:
          DJANGO_SETTINGS_MODULE: my_site.settings
        run: |
          mkdir -p docs
          python -c "
          import os, django, pydoc, shutil, glob
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'my_site.settings')
          django.setup()
          modules = [
              'blog.models', 'blog.views', 'blog.urls',
              'blog.admin', 'blog.apps',
              'my_site.urls', 'my_site.settings',
              'my_site.wsgi', 'my_site.asgi',
              'manage'
          ]
          for m in modules:
              try:
                  pydoc.writedoc(m)
                  print(f'OK: {m}')
              except Exception as e:
                  print(f'Error {m}: {e}')
          for f in glob.glob('*.html'):
              shutil.move(f, 'docs/')
          "

      - name: Publica a GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
